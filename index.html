<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Boykot Rehberi</title>
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Telefonda hızlı marka boykot arama rehberi">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>Boykot Rehberi</h1>
        <p>Markayı yaz, sonucu hemen gör.</p>
      </div>
      <button id="installBtn" class="install" hidden>📲 Yükle</button>
    </header>

    <section class="searchPanel">
      <div class="searchLine">
        <span>🔍</span>
        <input id="search" type="search" placeholder="Marka ara..." autocomplete="off" autofocus>
        <button id="clearBtn" title="Temizle">×</button>
      </div>

      <div class="filters">
        <button data-filter="all" class="active">Hepsi</button>
        <button data-filter="boykot">🔴 Boykot</button>
        <button data-filter="dikkat">🟠 Dikkat</button>
        <button data-filter="alternatif">🟢 Alternatif</button>
        <button data-filter="inceleniyor">⚪ İnceleniyor</button>
      </div>
    </section>

    <section class="stats" id="stats"></section>
    <section id="results" class="results"></section>

    <nav class="bottomNav">
      <button data-view="search" class="navActive">🔍<small>Ara</small></button>
      <button data-view="companies">🏢<small>Firmalar</small></button>
      <button data-view="categories">📂<small>Kategori</small></button>
      <button data-view="about">ℹ️<small>Bilgi</small></button>
    </nav>
  </main>

  <dialog id="detailDialog">
    <article id="detailContent"></article>
    <button id="closeDialog">Kapat</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
