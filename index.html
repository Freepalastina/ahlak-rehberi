<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#556B2F">
  <title>Boykot Rehberi</title>
  <link rel="manifest" href="manifest.json?v=20260705-olive-real">
  <link rel="stylesheet" href="style.css?v=20260705-olive-real">
</head>
<body>
  <header class="top">
    <div class="topRow">
      <div class="logo">☘️</div>
      <div class="headline">
        <h1>Boykot Rehberi</h1>
        <p>Marka, ana firma ve alternatif ara</p>
      </div>
      <button id="themeBtn" class="themeBtn" type="button" aria-label="Tema değiştir">🌙</button>
    </div>
    <div class="searchWrap">
      <span>🔍</span>
      <input id="search" type="search" placeholder="Marka, ana firma, kategori veya alternatif..." autocomplete="off">
      <button id="clearBtn" type="button" aria-label="Temizle">×</button>
    </div>
  </header>

  <main class="app">
    <section id="stats" class="stats"></section>
    <section id="filters" class="filters"></section>
    <section id="sectionTitle" class="sectionTitle"></section>
    <section id="results" class="results"></section>
  </main>

  <nav class="nav">
    <button class="active" data-view="home" type="button"><span>🏠</span><small>Ana Sayfa</small></button>
    <button data-view="companies" type="button"><span>🏢</span><small>Ana Firmalar</small></button>
    <button data-view="categories" type="button"><span>📂</span><small>Kategoriler</small></button>
    <button data-view="favorites" type="button"><span>⭐</span><small>Favoriler</small></button>
    <button data-view="about" type="button"><span>ℹ️</span><small>Hakkında</small></button>
  </nav>

  <dialog id="detailDialog" class="dialog">
    <div id="detailContent"></div>
    <button id="closeDialog" class="close" type="button">Kapat</button>
  </dialog>

  <script src="app.js?v=20260705-olive-real"></script>
</body>
</html>
