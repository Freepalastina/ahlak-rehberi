<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Boykot Rehberi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="appShell">
    <header class="hero">
      <div class="topbar">
        <div class="brandMark">BR</div>
        <div>
          <h1>Boykot Rehberi</h1>
          <p id="subtitle">Marka, ana firma ve alternatif ara</p>
        </div>
        <button id="themeBtn" class="iconBtn" type="button" aria-label="Tema değiştir">☾</button>
      </div>

      <label class="searchBox">
        <span>🔎</span>
        <input id="search" type="search" autocomplete="off" placeholder="Marka, ana firma, kategori veya alternatif ara..." />
        <button id="clearBtn" type="button" aria-label="Aramayı temizle">×</button>
      </label>

      <div id="stats" class="stats"></div>
    </header>

    <main class="content">
      <section id="sectionHeader" class="sectionHeader"></section>
      <section id="results" class="results"></section>
    </main>

    <nav class="bottomNav" aria-label="Alt menü">
      <button data-view="home" class="active" type="button"><span>⌂</span><b>Ana Sayfa</b></button>
      <button data-view="companies" type="button"><span>🏢</span><b>Ana Firma</b></button>
      <button data-view="categories" type="button"><span>▦</span><b>Kategori</b></button>
      <button data-view="favorites" type="button"><span>★</span><b>Favori</b></button>
      <button data-view="about" type="button"><span>ⓘ</span><b>Bilgi</b></button>
    </nav>
  </div>

  <dialog id="detailDialog" class="detailDialog">
    <button id="closeDialog" class="closeDialog" type="button">×</button>
    <div id="detailContent"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
