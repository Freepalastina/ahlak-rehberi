<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#6f7f3f" />
  <title>Boykot Rehberi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="appShell">
    <header class="hero">
      <div class="topLine">
        <div class="brandMark">BR</div>
        <div>
          <h1 id="appTitle">Boykot Rehberi</h1>
          <p id="appSubtitle">Marka, ana firma ve alternatif arama</p>
        </div>
        <button id="themeBtn" class="iconBtn" aria-label="Tema">🌙</button>
      </div>

      <div class="langBar" aria-label="Language">
        <button data-lang="tr" class="langBtn active">🇹🇷 TR</button>
        <button data-lang="en" class="langBtn">🇬🇧 EN</button>
        <button data-lang="de" class="langBtn">🇩🇪 DE</button>
      </div>

      <label class="searchBox">
        <span>🔍</span>
        <input id="search" autocomplete="off" placeholder="Marka ara..." />
        <button id="clearBtn" class="clearBtn" aria-label="Temizle">×</button>
      </label>
    </header>

    <main>
      <section id="stats" class="stats"></section>
      <section id="chips" class="chips"></section>
      <section id="results" class="results"></section>
    </main>
  </div>

  <nav class="bottomNav" aria-label="Navigation">
    <button data-view="home" class="navActive"><span>🏠</span><b data-i18n="navHome">Ana Sayfa</b></button>
    <button data-view="companies"><span>🏢</span><b data-i18n="navCompanies">Ana Firmalar</b></button>
    <button data-view="categories"><span>📂</span><b data-i18n="navCategories">Kategoriler</b></button>
    <button data-view="notBoycotted"><span>✅</span><b data-i18n="navNotBoycotted">Boykotta Değil</b></button>
    <button data-view="about"><span>ℹ️</span><b data-i18n="navAbout">Hakkında</b></button>
  </nav>

  <dialog id="detailDialog">
    <div id="detailContent"></div>
    <button id="closeDialog" class="primaryBtn">Kapat</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
