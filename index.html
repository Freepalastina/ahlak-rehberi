<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Boykot Rehberi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="appShell">
    <header class="hero">
      <div class="heroTop">
        <div class="brandMark">BR</div>
        <div>
          <h1>Boykot Rehberi</h1>
          <p id="subtitle">Marka, ana firma ve alternatif ara</p>
        </div>
        <button id="themeBtn" class="iconBtn" aria-label="Tema değiştir">🌙</button>
      </div>

      <label class="searchBox" for="searchInput">
        <span>🔎</span>
        <input id="searchInput" type="search" placeholder="Marka, ana firma, kategori veya alternatif ara..." autocomplete="off" />
        <button id="clearSearch" class="clearBtn" aria-label="Aramayı temizle">×</button>
      </label>

      <div class="quickFilters" aria-label="Filtreler">
        <button class="chip active" data-filter="all">Tümü</button>
        <button class="chip" data-filter="boykot">Boykot</button>
        <button class="chip" data-filter="inceleniyor">İnceleniyor</button>
        <button class="chip" data-filter="alternatif">Alternatif</button>
      </div>
    </header>

    <main>
      <section id="stats" class="stats"></section>
      <section id="contentTitle" class="sectionTitle"></section>
      <section id="results" class="results"></section>
    </main>
  </div>

  <nav class="bottomNav" aria-label="Alt menü">
    <button class="navActive" data-view="home"><span>🏠</span><small>Ana Sayfa</small></button>
    <button data-view="companies"><span>🏢</span><small>Ana Firmalar</small></button>
    <button data-view="categories"><span>📂</span><small>Kategoriler</small></button>
    <button data-view="favorites"><span>⭐</span><small>Favoriler</small></button>
    <button data-view="about"><span>ℹ️</span><small>Hakkında</small></button>
  </nav>

  <dialog id="detailDialog" class="sheet">
    <div id="detailContent"></div>
    <button id="closeDialog" class="primaryBtn">Kapat</button>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
